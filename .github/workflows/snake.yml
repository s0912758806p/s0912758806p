# ============================================================
#  貢獻蛇產生器 / Contribution Snake generator
#  放到：你的 profile repo 的  .github/workflows/snake.yml
#  Place at: <profile-repo>/.github/workflows/snake.yml
# ============================================================
name: Generate Snake Animation

on:
  schedule:
    # 每 12 小時更新一次 / runs every 12 hours
    - cron: "0 */12 * * *"
  # 也可在 Actions 分頁手動觸發 / allow manual run
  workflow_dispatch:
  # push 到 main 時也更新 / update on push to main
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
